<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scanner Screen - Sheikh Al Jabal</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee79",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102217",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    animation: {
                        'scan-laser': 'scan 2.5s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        scan: {
                            '0%, 100%': { top: '0%' },
                            '50%': { top: '100%' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(16, 34, 23, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .scan-frame-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #2bee79;
            border-style: solid;
            transition: all 0.3s ease;
        }

        /* Top Left */
        .corner-tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-top-left-radius: 1.5rem; }
        /* Top Right */
        .corner-tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-top-right-radius: 1.5rem; }
        /* Bottom Right */
        .corner-br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-bottom-right-radius: 1.5rem; }
        /* Bottom Left */
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-bottom-left-radius: 1.5rem; }

        .laser-glow {
            box-shadow: 0 0 15px rgba(43, 238, 121, 0.6), 0 0 30px rgba(43, 238, 121, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col group/design-root">
<!-- Camera Preview Simulation -->
<div class="absolute inset-0 z-0 bg-gray-900">
<img class="h-full w-full object-cover opacity-60" data-alt="Blurred view of supermarket shelves with various products in a modern grocery store aisle" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBxNkj47GLb7DyiplJhVmIhb-NLK4MUPeWfApDjDKfjfHc3wj3Bb7Myo_tXUyRITOF3TzYe4cjICfcCgVPUgQqicNjkTr3wKdXcmctfxnckwo6Vq6DdvjjqZx6Z6vB6WySVvcMeOOZkh8BneNgjyfMCP4hA8fHxQC8tkdDmKrtBb9H9egLY51MQzGKqoN0CW8nAZs2CLOGF8slrIadUl8pq0YoaHK4NW9KShqU-q1AwQq-wNPWaPoj2op2bZstJlKP1gP66ag910k"/>
<!-- Vignette Overlay -->
<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>
</div>
<!-- Top App Bar -->
<div class="relative z-20 flex items-center justify-between p-4 pt-12 pb-2">
<button class="text-white flex size-12 shrink-0 items-center justify-center rounded-full bg-black/20 backdrop-blur-md active:bg-black/40 transition-colors">
<span class="material-symbols-outlined text-white" style="font-size: 24px;">arrow_back</span>
</button>
<button class="flex size-12 shrink-0 items-center justify-center rounded-full bg-black/20 backdrop-blur-md text-white active:bg-primary active:text-black transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">flash_on</span>
</button>
</div>
<!-- Scanner Viewfinder Area -->
<div class="relative z-10 flex flex-1 flex-col items-center justify-center -mt-20">
<!-- Scanning Frame -->
<div class="relative h-64 w-64 md:h-80 md:w-80 rounded-3xl border border-white/20 bg-white/5 backdrop-blur-[1px] shadow-2xl overflow-hidden">
<!-- Animated Corners -->
<div class="scan-frame-corner corner-tl shadow-[0_0_10px_rgba(43,238,121,0.3)]"></div>
<div class="scan-frame-corner corner-tr shadow-[0_0_10px_rgba(43,238,121,0.3)]"></div>
<div class="scan-frame-corner corner-br shadow-[0_0_10px_rgba(43,238,121,0.3)]"></div>
<div class="scan-frame-corner corner-bl shadow-[0_0_10px_rgba(43,238,121,0.3)]"></div>
<!-- Laser Scan Line -->
<div class="absolute left-0 right-0 h-[2px] bg-primary laser-glow animate-scan-laser w-full opacity-90"></div>
<!-- Grid Overlay (Decorative) -->
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(#fff_1px,transparent_1px)] [background-size:16px_16px]"></div>
</div>
<!-- Helper Text -->
<p class="text-white/90 text-sm font-medium tracking-wide mt-6 bg-black/30 px-4 py-2 rounded-full backdrop-blur-sm border border-white/5">
                Align barcode within frame
            </p>
</div>
<!-- Bottom Sheet -->
<div class="relative z-30 w-full glass-panel rounded-t-[2.5rem] pb-8 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] transform translate-y-0 transition-transform duration-300">
<!-- Handle -->
<div class="flex w-full flex-col items-center pt-4 pb-2">
<div class="h-1.5 w-12 rounded-full bg-white/20"></div>
</div>
<div class="px-6 pt-2">
<h3 class="text-white tracking-tight text-xl font-bold leading-tight pb-4">Having trouble scanning?</h3>
<div class="flex flex-col gap-4">
<label class="flex flex-col flex-1 relative group">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-primary/80">
<span class="material-symbols-outlined">barcode_reader</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-2xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-white/10 bg-black/40 focus:border-primary h-14 placeholder:text-gray-400 pl-12 pr-4 text-base font-medium leading-normal transition-all" placeholder="Enter barcode manually" type="number" value=""/>
</label>
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 bg-primary hover:bg-[#1fdc6d] text-background-dark gap-2 text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" style="font-size: 20px;">add_shopping_cart</span>
                        Add to Cart
                    </button>
</div>
</div>
</div>
</div>
</body></html>
