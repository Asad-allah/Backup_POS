name: iOS Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./backup_pos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Package Payload to Unsigned IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-release-unsigned.ipa Payload

      - name: Upload iOS File
        uses: actions/upload-artifact@v4
        with:
          name: IOS-Unsigned-Release
          path: backup_pos/app-release-unsigned.ipa
          retention-days: 7
